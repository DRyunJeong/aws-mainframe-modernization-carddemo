# Oracle config for CBTRN01C (verify daily transactions).
CBL="$REPO/app/cbl/CBTRN01C.cbl"

wire_inputs() {
    local work="$1" ds="$2"
    export SRCDALY="$ds/dailytran.dat" SRCXREF="$ds/cardxref.dat" SRCACCT="$ds/acctdata.dat"
    export DD_SRCDALY="$SRCDALY" DD_SRCXREF="$SRCXREF" DD_SRCACCT="$SRCACCT"
    export DALYTRAN="$work/dalytran" XREFFILE="$work/xreffile" ACCTFILE="$work/acctfile"
    export CUSTFILE="$work/custfile" CARDFILE="$work/cardfile" TRANFILE="$work/tranfile"
    export DD_DALYTRAN="$DALYTRAN" DD_XREFFILE="$XREFFILE" DD_ACCTFILE="$ACCTFILE"
    export DD_CUSTFILE="$CUSTFILE" DD_CARDFILE="$CARDFILE" DD_TRANFILE="$TRANFILE"
    export PGMNAME=CBTRN01C COB_FILE_PATH="$work"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
