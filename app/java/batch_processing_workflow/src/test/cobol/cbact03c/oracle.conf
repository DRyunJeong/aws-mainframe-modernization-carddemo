# Oracle config for CBACT03C (read & print card xref). Sourced by run_oracle.sh.
CBL="$REPO/app/cbl/CBACT03C.cbl"

wire_inputs() {
    local work="$1" ds="$2"
    export SRCXREF="$ds/cardxref.dat" DD_SRCXREF="$ds/cardxref.dat"
    export XREFFILE="$work/xreffile"  DD_XREFFILE="$work/xreffile"
    export PGMNAME=CBACT03C COB_FILE_PATH="$work"
}

capture_outputs() {
    local work="$1" g="$2"
    # CBACT03C's only output is SYSOUT (DISPLAY)
    cp "$work/stdout.txt" "$g/stdout.txt"
}
