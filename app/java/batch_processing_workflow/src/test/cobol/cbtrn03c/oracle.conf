# Oracle config for CBTRN03C (transaction detail report).
# CBTRN03C runs standalone; tiny loaders set up the indexed lookup files. TRANSACT
# and DATEPARM are flat RECORD SEQUENTIAL inputs; TRANREPT is the flat report output.
RUN_DIRECT=1
CBL="$REPO/app/cbl/CBTRN03C.cbl"

compile_extra() {
    local build="$1"
    for p in LDXREF LDTTYP LDTCATG; do
        cobc -std="$STD" -free -x "$HERE/$prog/$p.cbl" -o "$build/$p"
    done
}

wire_inputs() {
    local work="$1" ds="$2"
    # flat RECORD SEQ inputs (strip LINE SEQ newlines)
    python3 -c "import sys; d=open('$ds/transact.dat','rb').read(); open('$work/transact','wb').write(b''.join(x for x in d.split(b'\n') if x))"
    python3 -c "import sys; d=open('$ds/dateparm.dat','rb').read(); open('$work/dateparm','wb').write(b''.join(x for x in d.split(b'\n') if x))"
    export SRCXREF="$ds/cardxref.dat" SRCTTYP="$ds/trantype.dat" SRCTCATG="$ds/trancatg.dat"
    export CARDXREF="$work/cardxref" TRANTYPE="$work/trantype" TRANCATG="$work/trancatg"
    export TRANFILE="$work/transact" DATEPARM="$work/dateparm" TRANREPT="$work/tranrept"
    export PGMNAME=CBTRN03C
    unset COB_FILE_PATH
    # load the indexed lookup files (loaders read SRC*, write CARDXREF/TRANTYPE/TRANCATG)
    "$BUILD/LDXREF" && "$BUILD/LDTTYP" && "$BUILD/LDTCATG"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/tranrept" "$g/report.dat"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
