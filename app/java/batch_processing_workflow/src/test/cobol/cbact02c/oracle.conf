# Oracle config for CBACT02C (read & print card file).
CBL="$REPO/app/cbl/CBACT02C.cbl"

wire_inputs() {
    local work="$1" ds="$2"
    export SRCCARD="$ds/carddata.dat" DD_SRCCARD="$ds/carddata.dat"
    export CARDFILE="$work/cardfile"  DD_CARDFILE="$work/cardfile"
    export PGMNAME=CBACT02C COB_FILE_PATH="$work"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
