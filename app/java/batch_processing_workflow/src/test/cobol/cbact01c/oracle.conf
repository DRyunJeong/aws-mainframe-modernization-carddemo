# Oracle config for CBACT01C (read account file -> 3 output files + SYSOUT).
# CBACT01C CALLs the assembler module COBDATFT (date format); we link a faithful
# COBOL stand-in (COBDATFT.cbl) so the unmodified program runs under GnuCOBOL.
RUN_DIRECT=1
CBL="$REPO/app/cbl/CBACT01C.cbl"
EXTRA_CBL="$HERE/$prog/COBDATFT.cbl"

compile_extra() {
    local build="$1"
    cobc -std="$STD" -free -x "$HERE/$prog/LDACCT.cbl" -o "$build/LDACCT"
}

wire_inputs() {
    local work="$1" ds="$2"
    export SRCACCT="$ds/acctdata.dat" ACCTFILE="$work/acctfile"
    export OUTFILE="$work/outfile" ARRYFILE="$work/arryfile" VBRCFILE="$work/vbrcfile"
    export PGMNAME=CBACT01C
    unset COB_FILE_PATH
    "$BUILD/LDACCT"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/outfile"  "$g/outfile.dat"
    cp "$work/arryfile" "$g/arryfile.dat"
    cp "$work/vbrcfile" "$g/vbrcfile.dat"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
