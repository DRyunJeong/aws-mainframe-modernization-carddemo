# Oracle config for CBCUS01C (read & print customer file).
CBL="$REPO/app/cbl/CBCUS01C.cbl"

wire_inputs() {
    local work="$1" ds="$2"
    export SRCCUST="$ds/custdata.dat" DD_SRCCUST="$ds/custdata.dat"
    export CUSTFILE="$work/custfile"  DD_CUSTFILE="$work/custfile"
    export PGMNAME=CBCUS01C COB_FILE_PATH="$work"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
