# Oracle config for CBIMPORT (multi-record export file -> 5 split outputs + errors).
#
# Same file-I/O-only adaptation as CBEXPORT: EXPORT-INPUT is declared INDEXED with
# RECORD KEY IS EXPORT-SEQUENCE-NUM, but that key is in WORKING-STORAGE, so GnuCOBOL
# rejects it. The program reads it sequentially (ACCESS SEQUENTIAL), so we change the
# organization to SEQUENTIAL and feed the flat export file (record-sequential, 500-byte
# records, in sequence order). Record content, read order, and routing are unchanged.
# The five target outputs and the error file are already SEQUENTIAL.
RUN_DIRECT=1

GEN="$HERE/$prog/CBIMPORT.gen.cbl"
python3 - "$REPO/app/cbl/CBIMPORT.cbl" "$GEN" <<'PY'
import sys
src = open(sys.argv[1]).read()
src = src.replace(
"""           SELECT EXPORT-INPUT ASSIGN TO EXPFILE
               ORGANIZATION IS INDEXED
               ACCESS MODE IS SEQUENTIAL
               RECORD KEY IS EXPORT-SEQUENCE-NUM
               FILE STATUS IS WS-EXPORT-STATUS.""",
"""           SELECT EXPORT-INPUT ASSIGN TO EXPFILE
               ORGANIZATION IS SEQUENTIAL
               FILE STATUS IS WS-EXPORT-STATUS.""")
assert "RECORD KEY IS EXPORT-SEQUENCE-NUM" not in src, "adaptation failed"
open(sys.argv[2], 'w').write(src)
PY
CBL="$GEN"

wire_inputs() {
    local work="$1" ds="$2"
    cp "$ds/expdata.dat" "$work/expfile"        # raw 500-byte record-sequential input
    export EXPFILE="$work/expfile"
    export CUSTOUT="$work/custout" ACCTOUT="$work/acctout" XREFOUT="$work/xrefout" \
           TRNXOUT="$work/trnxout" CARDOUT="$work/cardout" ERROUT="$work/errout"
    unset COB_FILE_PATH
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/custout" "$g/custout.dat"
    cp "$work/acctout" "$g/acctout.dat"
    cp "$work/xrefout" "$g/xrefout.dat"
    cp "$work/trnxout" "$g/trnxout.dat"
    cp "$work/cardout" "$g/cardout.dat"
    # ERR-TIMESTAMP (FUNCTION CURRENT-DATE) is masked; an empty error file is tolerated.
    if [ -s "$work/errout" ]; then
        mask_ts "$work/errout" "$g/errout.dat" 132 0 26
    else
        : > "$g/errout.dat"
    fi
}
