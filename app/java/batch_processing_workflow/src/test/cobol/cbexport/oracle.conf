# Oracle config for CBEXPORT (5 masters -> multi-record export file).
#
# File-I/O-only adaptation: the original SELECTs EXPORT-OUTPUT as INDEXED with
# RECORD KEY IS EXPORT-SEQUENCE-NUM, but that key lives in WORKING-STORAGE (not in
# the FD record), so GnuCOBOL rejects it ("EXPORT-SEQUENCE-NUM is not defined").
# The program only ever WRITEs it sequentially, so we change the organization to
# SEQUENTIAL. The 500-byte record images and their write order are unchanged — only
# the on-disk file organization differs (the export file becomes a flat record-
# sequential file, which is exactly what we capture as the golden). Business logic
# is untouched. The five INPUT masters keep ORGANIZATION INDEXED (their keys ARE in
# the FD record) so the SEQUENTIAL reads return ascending-key order; tiny per-file
# loaders build those BDB KSDS from the normalized samples.
RUN_DIRECT=1

GEN="$HERE/$prog/CBEXPORT.gen.cbl"
python3 - "$REPO/app/cbl/CBEXPORT.cbl" "$GEN" <<'PY'
import sys
src = open(sys.argv[1]).read()
src = src.replace(
"""           SELECT EXPORT-OUTPUT ASSIGN TO EXPFILE
               ORGANIZATION IS INDEXED
               ACCESS MODE IS SEQUENTIAL
               RECORD KEY IS EXPORT-SEQUENCE-NUM
               FILE STATUS IS WS-EXPORT-STATUS.""",
"""           SELECT EXPORT-OUTPUT ASSIGN TO EXPFILE
               ORGANIZATION IS SEQUENTIAL
               FILE STATUS IS WS-EXPORT-STATUS.""")
assert "RECORD KEY IS EXPORT-SEQUENCE-NUM" not in src, "adaptation failed"
open(sys.argv[2], 'w').write(src)
PY
CBL="$GEN"

compile_extra() {
    local build="$1"
    for p in LDCUST LDACCT LDXREF LDTRAN LDCARD; do
        cobc -std="$STD" -free -x "$HERE/$prog/$p.cbl" -o "$build/$p"
    done
}

wire_inputs() {
    local work="$1" ds="$2"
    export SRCCUST="$ds/custdata.dat" SRCACCT="$ds/acctdata.dat" SRCXREF="$ds/cardxref.dat" \
           SRCTRAN="$ds/trandata.dat" SRCCARD="$ds/carddata.dat"
    export CUSTFILE="$work/custfile" ACCTFILE="$work/acctfile" XREFFILE="$work/xreffile" \
           TRANSACT="$work/transact" CARDFILE="$work/cardfile" EXPFILE="$work/expfile"
    unset COB_FILE_PATH
    "$BUILD/LDCUST" && "$BUILD/LDACCT" && "$BUILD/LDXREF" && "$BUILD/LDTRAN" && "$BUILD/LDCARD"
}

capture_outputs() {
    local work="$1" g="$2"
    mask_ts "$work/expfile" "$g/expfile.dat" 500 1 27       # mask 26-byte EXPORT-TIMESTAMP
    # chain: the (masked) export file is CBIMPORT's input — CBIMPORT ignores the timestamp.
    if [ "$(basename "$g")" = sample ]; then
        mkdir -p "$PROJ/src/test/resources/datasets/cbimport/sample"
        cp "$g/expfile.dat" "$PROJ/src/test/resources/datasets/cbimport/sample/expdata.dat"
    fi
}
