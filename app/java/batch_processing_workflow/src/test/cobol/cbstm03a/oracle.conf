# Oracle config for CBSTM03A (account statements: text + HTML), with subprogram CBSTM03B.
#
# Adaptations (non-portable constructs only; statement/HTML output is unchanged):
#  1. The PROCEDURE DIVISION opens with PSA/TCB/TIOT mainframe control-block addressing that
#     dereferences an uninitialized POINTER (PSAPTR) — it only DISPLAYs DD names and crashes
#     off-mainframe, so it is stubbed to CONTINUE. (Its DISPLAY output is not a data product.)
#  2. CUSTREC.cpy ships tab-indented, which breaks GnuCOBOL -fixed column parsing; a detabbed
#     copy (identical content) under cbstm03a/cpy/ is put first on the copybook path (INCDIRS).
# File I/O is done by the subprogram CBSTM03B (standard INDEXED, keys in-record) — compiled as-is
# and linked via EXTRA_CBL. The four INPUT masters are built as BDB KSDS by tiny loaders.
RUN_DIRECT=1
EXTRA_CBL="$REPO/app/cbl/CBSTM03B.cbl"
INCDIRS="-I $HERE/$prog/cpy"

GEN="$HERE/$prog/CBSTM03A.gen.cbl"
python3 - "$REPO/app/cbl/CBSTM03A.cbl" "$GEN" <<'PY'
import sys, re
src = open(sys.argv[1]).read()
# stub the PSA/TCB/TIOT control-block section (from its first SET ADDRESS up to OPEN OUTPUT)
pat = re.compile(r"           SET ADDRESS OF PSA-BLOCK.*?(?=           OPEN OUTPUT STMT-FILE)", re.DOTALL)
stub = ("      *    [oracle adaptation] PSA/TCB/TIOT control-block DISPLAY stubbed (non-portable)\n"
        "           CONTINUE.\n\n")
src2 = pat.sub(stub, src)
assert "SET ADDRESS OF PSA-BLOCK" not in src2, "TIOT stub failed"
open(sys.argv[2], 'w').write(src2)
PY
CBL="$GEN"

compile_extra() {
    local build="$1"
    for p in LDTRNX LDXREF LDCUST LDACCT; do
        cobc -std="$STD" -free -x "$HERE/$prog/$p.cbl" -o "$build/$p"
    done
}

wire_inputs() {
    local work="$1" ds="$2"
    export SRCTRNX="$ds/trnxdata.dat" SRCXREF="$ds/cardxref.dat" \
           SRCCUST="$ds/custdata.dat" SRCACCT="$ds/acctdata.dat"
    export TRNXFILE="$work/trnxfile" XREFFILE="$work/xreffile" \
           CUSTFILE="$work/custfile" ACCTFILE="$work/acctfile"
    export STMTFILE="$work/stmt" HTMLFILE="$work/html"
    unset COB_FILE_PATH
    "$BUILD/LDTRNX" && "$BUILD/LDXREF" && "$BUILD/LDCUST" && "$BUILD/LDACCT"
}

capture_outputs() {
    local work="$1" g="$2"
    cp "$work/stmt" "$g/stmt.txt"
    cp "$work/html" "$g/html.txt"
}
