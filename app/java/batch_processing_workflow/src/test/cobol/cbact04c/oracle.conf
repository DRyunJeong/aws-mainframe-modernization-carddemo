# Oracle config for CBACT04C (interest calculator). Sourced by run_oracle.sh.
CBL="$REPO/app/cbl/CBACT04C.cbl"

wire_inputs() {
    local work="$1" ds="$2"
    # input sample data (LINE SEQUENTIAL, native-encoded) -> harness loads into BDB INDEXED
    export SRCTCAT="$ds/tcatbal.dat"  SRCXREF="$ds/cardxref.dat"  SRCDISC="$ds/discgrp.dat"  SRCACCT="$ds/acctdata.dat"
    export DD_SRCTCAT="$SRCTCAT" DD_SRCXREF="$SRCXREF" DD_SRCDISC="$SRCDISC" DD_SRCACCT="$SRCACCT"
    # the 4 KSDS the program opens (same DD names as the JCL) + output files
    export TCATBALF="$work/tcatbalf" XREFFILE="$work/xreffile" DISCGRP="$work/discgrp" ACCTFILE="$work/acctfile"
    export TRANSACT="$work/transact" ACCTDUMP="$work/acctdump.dat"
    export DD_TCATBALF="$TCATBALF" DD_XREFFILE="$XREFFILE" DD_DISCGRP="$DISCGRP" DD_ACCTFILE="$ACCTFILE"
    export DD_TRANSACT="$TRANSACT" DD_ACCTDUMP="$ACCTDUMP"
    export PGMNAME=CBACT04C COB_FILE_PATH="$work"
}

capture_outputs() {
    local work="$1" g="$2"
    # TRANSACT: mask the two CURRENT-DATE timestamp fields [278,330) in each 350-byte record
    mask_ts "$work/transact" "$g/transact.dat" 350 278 330
    cp "$work/acctdump.dat" "$g/acctdump.dat"
    cp "$work/stdout.txt"   "$g/stdout.txt"
}
