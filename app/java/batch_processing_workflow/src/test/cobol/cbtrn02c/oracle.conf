# Oracle config for CBTRN02C (post daily transactions).
# CBTRN02C runs standalone; tiny per-file loader/dumper programs set up and read
# back the BDB KSDS files. (A single combined harness with all files trips a
# GnuCOBOL many-files codegen issue, so we split it into small programs.)
RUN_DIRECT=1
CBL="$REPO/app/cbl/CBTRN02C.cbl"

compile_extra() {
    local build="$1"
    for p in LDXREF LDACCT LDTCAT DPACCT DPTCAT DPTRAN; do
        cobc -std="$STD" -free -x "$HERE/$prog/$p.cbl" -o "$build/$p"
    done
}

wire_inputs() {
    local work="$1" ds="$2"
    # flat RECORD SEQ DALYTRAN (strip LINE SEQ newlines)
    python3 -c "import sys; d=open('$ds/dailytran.dat','rb').read(); open('$work/dalytran','wb').write(b''.join(x for x in d.split(b'\n') if x))"
    export SRCXREF="$ds/cardxref.dat" SRCACCT="$ds/acctdata.dat" SRCTCAT="$ds/tcatbal.dat"
    export XREFFILE="$work/xreffile" ACCTFILE="$work/acctfile" TCATBALF="$work/tcatbalf"
    # NB: CBTRN02C writes the posted-transaction KSDS via DD name TRANFILE (not TRANSACT).
    export DALYTRAN="$work/dalytran" TRANFILE="$work/transact" DALYREJS="$work/dalyrejs"
    export ACCTDUMP="$work/acctdump" TCATDUMP="$work/tcatdump" TRANDUMP="$work/trandump"
    # NB: do NOT set COB_FILE_PATH here — with it set, GnuCOBOL's LINE SEQUENTIAL read
    # of the absolute-path inputs never raises AT END (infinite loop). All paths are
    # absolute, so COB_FILE_PATH is unnecessary.
    export PGMNAME=CBTRN02C
    unset COB_FILE_PATH
    # load the KSDS the program reads/updates
    "$BUILD/LDXREF" && "$BUILD/LDACCT" && "$BUILD/LDTCAT"
}

capture_outputs() {
    local work="$1" g="$2"
    # dump the created/updated KSDS to flat files (TRANSACT may be empty -> tolerate)
    "$BUILD/DPACCT"; "$BUILD/DPTCAT"; "$BUILD/DPTRAN" 2>/dev/null || : > "$work/trandump"
    [ -f "$work/trandump" ] || : > "$work/trandump"
    mask_ts "$work/trandump" "$g/transact.dat" 350 304 330
    cp "$work/tcatdump"  "$g/tcatbaldump.dat"
    cp "$work/acctdump"  "$g/acctdump.dat"
    cp "$work/dalyrejs"  "$g/rejects.dat" 2>/dev/null || : > "$g/rejects.dat"
    cp "$work/stdout.txt" "$g/stdout.txt"
}
